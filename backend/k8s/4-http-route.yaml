apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cac-route
  namespace: default
spec:
  parentRefs:
    - name: gateway-api
      namespace: default

  hostnames:
    - "cac.guz-studio.dev"

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: cac-service
          port: 80
