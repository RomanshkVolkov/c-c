name: swarm-manage image

on:
  push:
    branches: [main]
    paths:
      - "swarm-manage/**"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./swarm-manage
          push: true
          tags: ghcr.io/romanshkvolkov/c-c/swarm-manage:latest
