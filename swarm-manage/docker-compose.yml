version: "3.8"

services:
  swarm-manage:
    image: ghcr.io/romanshkvolkov/c-c/swarm-manage:latest
    ports:
      - "9090:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: "9090"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
